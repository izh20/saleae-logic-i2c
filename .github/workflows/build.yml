name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_prefix: macos
          - os: windows-latest
            artifact_prefix: windows
          - os: ubuntu-latest
            artifact_prefix: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: touchpad-tracker/package-lock.json

      - name: Install dependencies
        working-directory: touchpad-tracker
        run: npm ci

      - name: Build application
        working-directory: touchpad-tracker
        run: npm run make

      - name: Upload artifacts
        working-directory: touchpad-tracker
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_prefix }}-touchpad-tracker
          path: |
            out/make/**
            out/package/**
          retention-days: 7
