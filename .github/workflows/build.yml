name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_prefix: macos
          - os: windows-latest
            artifact_prefix: windows
          - os: ubuntu-latest
            artifact_prefix: linux

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
      NODE_TLS_REJECT_UNAUTHORIZED: '0'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: touchpad-tracker/package-lock.json

      - name: Install dependencies
        run: rm -rf node_modules package-lock.json && npm install
        working-directory: touchpad-tracker

      - name: Verify electron-store installed
        run: ls node_modules/electron-store 2>/dev/null || echo "electron-store NOT FOUND"
        working-directory: touchpad-tracker

      - name: Build application
        run: npm run make
        working-directory: touchpad-tracker

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_prefix }}-touchpad-tracker
          path: |
            touchpad-tracker/out/make/**
            touchpad-tracker/out/package/**
          retention-days: 90

  # 等待所有平台构建完成后创建 Release
  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f -ls

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Build ${{ github.sha }}"
          tag_name: "build-${{ github.run_number }}"
          files: |
            artifacts/**/*
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}