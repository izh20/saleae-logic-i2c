name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_prefix: macos
          - os: windows-latest
            artifact_prefix: windows
          - os: ubuntu-latest
            artifact_prefix: linux

    runs-on: ${{ matrix.os }}

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
      NODE_TLS_REJECT_UNAUTHORIZED: '0'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: touchpad-tracker/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: touchpad-tracker

      - name: Build application
        run: npm run make
        working-directory: touchpad-tracker

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_prefix }}-touchpad-tracker
          path: |
            touchpad-tracker/out/make/**
            touchpad-tracker/out/package/**
          retention-days: 7